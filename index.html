<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Evangelista de Souza Advogados — Sistema</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>

:root{
  --bg:#1c2333; --bg2:#232b3e; --bg3:#2a3347;
  --sidebar:#1e2740;
  --card:rgba(30,36,52,0.96);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#e8edf5; --text2:#8892a4; --text3:#4a5568;
  --teal:#1de9b6; --purple:#a389d4; --orange:#f7c321; --blue:#4680ff;
  --gold:#d4af5a; --gold2:#f0d890;
  --ok:#1de9b6; --bad:#f44336; --warn:#f7c321; --info:#4680ff;
  --r:12px; --r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden}

/* ── FUNDO PRINCIPAL ── */
#bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#bg-photo{
  position:absolute;inset:0;
  background:url('BG_PH') center/cover no-repeat;
  opacity:0.22;
  mix-blend-mode:screen;
  filter:saturate(0.6) hue-rotate(180deg) brightness(0.8);
}
#bg-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(135deg,rgba(28,35,51,0.82) 0%,rgba(30,40,65,0.75) 50%,rgba(28,35,51,0.88) 100%);
}
#bg-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 90% 80% at 50% 50%,transparent 40%,rgba(10,14,26,0.6) 100%);
}
#particles{position:absolute;inset:0;opacity:0.7}

/* ── LOGOS DOS BANCOS (background animado) ── */
#bank-logos{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.bk-logo{
  position:absolute;
  width:56px;height:56px;border-radius:50%;
  object-fit:cover;
  opacity:0.18;
  filter:saturate(0.5) brightness(0.8);
  animation:floatBank linear infinite;
  border:2px solid rgba(255,255,255,0.08);
}
@keyframes floatBank{
  0%  {transform:translateY(110vh) scale(0.7) rotate(0deg);opacity:0}
  5%  {opacity:0.18}
  95% {opacity:0.18}
  100%{transform:translateY(-15vh) scale(1.1) rotate(360deg);opacity:0}
}

#app{position:relative;z-index:2;display:flex;min-height:100vh;width:100%}

/* ── SIDEBAR ── */
.sb{
  width:240px;flex-shrink:0;
  background:linear-gradient(180deg,#1a2238 0%,#1e2a40 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}
.sb::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--blue),var(--teal),var(--purple),var(--orange),var(--teal),var(--blue))}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);text-align:center}
.sb-logo img{max-width:190px;width:100%;filter:brightness(1.05) drop-shadow(0 0 8px rgba(29,233,182,0.2))}
.sb-user{padding:10px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.u-av{width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#1c2333;flex-shrink:0}
.u-name{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 7px;border-radius:20px;letter-spacing:.3px;margin-top:1px}
.sb-nav{flex:1;padding:7px 0;overflow-y:auto}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ni{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;
  cursor:pointer;font-size:12px;color:var(--text2);border-left:2.5px solid transparent;
  transition:all .15s;user-select:none}
.ni:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.ni.active{color:var(--teal);font-weight:600;background:rgba(29,233,182,0.07);border-left-color:var(--teal)}
.ni.cta{color:var(--gold);font-weight:600;background:rgba(212,175,90,0.07)}
.ni.cta:hover{background:rgba(212,175,90,0.12)}
.n-sep{height:.5px;background:var(--border);margin:5px 14px}
.n-ic{font-size:13px;opacity:.8;width:18px;flex-shrink:0}
.n-lbl{flex:1;margin-left:8px}
.n-badge{background:var(--teal);color:#1c2333;font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:20px;animation:pulse 1.8s infinite}
.sb-stats{padding:10px 14px;border-top:1px solid var(--border)}
.logout-btn{width:100%;padding:7px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s;margin-top:8px}
.logout-btn:hover{color:var(--bad);border-color:rgba(244,67,54,.3)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:24px 26px;min-width:0}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── PAGE HEADER ── */
.p-h1{font-family:'Cinzel',serif;font-size:20px;font-weight:700;
  background:linear-gradient(90deg,var(--teal),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px}
.p-sub{font-size:12px;color:var(--text2);margin-bottom:16px}

/* ── CARDS ── */
.card{
  background:var(--card);
  border:1px solid var(--border);border-radius:var(--r);
  padding:16px 18px;
  backdrop-filter:blur(12px);
  transition:border-color .2s,transform .2s;
}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card-teal  {border-top:3px solid var(--teal)!important;background:linear-gradient(135deg,var(--card),rgba(29,233,182,0.06))!important}
.card-purple{border-top:3px solid var(--purple)!important;background:linear-gradient(135deg,var(--card),rgba(163,137,212,0.06))!important}
.card-orange{border-top:3px solid var(--orange)!important;background:linear-gradient(135deg,var(--card),rgba(247,195,33,0.06))!important}
.card-blue  {border-top:3px solid var(--blue)!important;background:linear-gradient(135deg,var(--card),rgba(70,128,255,0.06))!important}
.card-gold  {border-top:3px solid var(--gold)!important}

/* ── KPI ── */
.kpi{text-align:center}
.k-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.k-val{font-family:'Cinzel',serif;font-size:26px;font-weight:700;line-height:1.1}
.k-sub{font-size:11px;color:var(--text2);margin-top:3px}

/* ── SEC TITLE ── */
.sec{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-dot{width:3px;height:14px;border-radius:2px;background:var(--teal);flex-shrink:0}
.sec-lbl{font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:var(--text);
  text-transform:uppercase;letter-spacing:.8px}

/* ── INPUTS ── */
input,select,textarea{
  background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border2);
  border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;
  padding:9px 11px;outline:none;transition:border-color .2s;
  width:100%;box-sizing:border-box}
input:focus,select:focus,textarea:focus{border-color:var(--teal)}
input::placeholder,textarea::placeholder{color:var(--text3)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6)}
select option{background:#1e2740;color:var(--text)}

/* ── BUTTONS ── */
.btn{border:none;border-radius:8px;cursor:pointer;font-family:'Cinzel',serif;
  font-size:11px;font-weight:700;letter-spacing:.5px;padding:9px 18px;transition:all .15s}
.btn-p{background:linear-gradient(135deg,var(--blue),var(--teal));color:#1c2333;
  box-shadow:0 2px 14px rgba(70,128,255,0.3)}
.btn-p:hover{box-shadow:0 4px 22px rgba(29,233,182,0.4);transform:translateY(-1px)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border2);
  font-family:'Inter',sans-serif;font-weight:400;font-size:12px}
.btn-g:hover{color:var(--text);border-color:var(--teal)}
.btn-o{background:transparent;color:var(--teal);border:1px solid rgba(29,233,182,0.3)}
.btn-o:hover{background:rgba(29,233,182,0.08)}
.btn-d{background:rgba(244,67,54,.12);color:var(--bad);border:1px solid rgba(244,67,54,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* ── BADGE ── */
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;display:inline-block}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(255,255,255,0.03)}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}

/* ── ROW ITEM ── */
.ri{display:flex;padding:6px 0;border-bottom:1px solid var(--border)}
.ri-l{width:44%;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.ri-v{flex:1;font-size:12px;color:var(--text);font-weight:500}

/* ── AVATAR ── */
.av{border-radius:50%;background:linear-gradient(135deg,#1e2a40,#2a3556);
  border:1px solid rgba(29,233,182,0.2);color:var(--teal);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-family:'Cinzel',serif}

/* ── PHASE STRIP ── */
.phase{display:flex;align-items:center;margin-top:14px}
.ph-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.ph-line{flex:1;height:2px;margin:0 6px;margin-bottom:10px;border-radius:2px}
.ph-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
  white-space:nowrap;margin-top:2px;text-align:center}

/* ── ANIMATIONS ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(29,233,182,.2)}50%{box-shadow:0 0 20px rgba(29,233,182,.5)}}
.anim{animation:fadeIn .35s ease forwards}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{
  width:100%;max-width:440px;
  background:linear-gradient(160deg,rgba(30,39,64,.97) 0%,rgba(26,34,56,.97) 100%);
  border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 60px rgba(29,233,182,0.05);
  animation:slideUp .5s ease;
}
.login-bar{height:3px;background:linear-gradient(90deg,var(--blue),var(--teal),var(--purple),var(--orange),var(--teal),var(--blue))}
.login-body{padding:32px 36px 28px}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo img{max-width:260px;width:100%;filter:brightness(1.1) drop-shadow(0 0 14px rgba(29,233,182,0.2))}
.login-sep{height:.5px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:18px 0}
.lbl{display:block;font-size:10px;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.digit-row{display:flex;gap:8px;justify-content:center}
.d-inp{
  width:42px;height:48px;text-align:center;font-size:20px;font-weight:700;
  font-family:'Cinzel',serif;border-radius:8px;
  border:1.5px solid var(--border2);background:rgba(255,255,255,.05);color:var(--teal);
  outline:none;cursor:text;transition:all .2s}
.d-inp.on{border-color:var(--teal);background:rgba(29,233,182,.08);
  box-shadow:0 0 0 3px rgba(29,233,182,.15)}
.login-btn{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--blue) 0%,var(--teal) 100%);
  color:#1c2333;font-family:'Cinzel',serif;font-size:12px;font-weight:700;
  letter-spacing:.8px;cursor:pointer;
  box-shadow:0 4px 20px rgba(70,128,255,0.35);transition:all .2s}
.login-btn:hover:not(:disabled){box-shadow:0 6px 32px rgba(29,233,182,.5);transform:translateY(-1px)}
.login-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.login-err{background:rgba(244,67,54,.1);border:1px solid rgba(244,67,54,.3);
  border-radius:8px;padding:8px 12px;font-size:12px;color:var(--bad);text-align:center;margin-bottom:12px}
.prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.prof-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;transition:all .15s}
.prof-item:hover{border-color:var(--teal);background:rgba(29,233,182,.05)}
.prof-ic{font-size:14px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── RELÓGIO ── */
#relogio-widget{
  position:sticky;top:0;z-index:10;
  display:flex;justify-content:flex-end;align-items:flex-start;
  padding:8px 0 6px;
  margin:-4px 0 8px;
  pointer-events:none;
}
#relogio-box{
  text-align:right;
  background:rgba(7,19,48,0.55);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:6px 14px 5px;
  pointer-events:none;
  min-width:140px;
}
#relogio-data{
  font-family:'Cinzel',serif;
  font-size:12px;font-weight:700;
  color:var(--gold2,#d4af5a);
  letter-spacing:.5px;
  line-height:1.3;
}
#relogio-hora{
  font-family:'Cinzel',serif;
  font-size:15px;font-weight:700;
  color:#1de9b6;
  letter-spacing:.3px;
  line-height:1.2;
  margin-top:1px;
}

</style>
</head>

  <div id="bg-photo"></div>
  <div id="bg-overlay"></div>
  <div id="bg-vignette"></div>
  <canvas id="particles"></canvas>
  <div id="bank-logos"></div>
</div>
<div id="app"></div>

/* Retorna URL da logo dado o nome do banco */
function getBankLogo(bancoNome) {
  if(!bancoNome) return null;
  const n = bancoNome.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  for(const [key, val] of Object.entries(BANK_LOGOS)){
    for(const alias of val.aliases){
      const a = alias.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
      if(n.includes(a) || a.includes(n)) return val.data;
    }
  }
  return null;
}

/* Avatar para LEAD — mostra logo do banco se disponível, senão iniciais */
function avLead(nome, banco, size=36) {
  const logo = getBankLogo(banco);
  if(logo){
    const wrap = div({
      width:size+'px', height:size+'px', borderRadius:'50%',
      overflow:'hidden', flexShrink:0,
      border:'1px solid rgba(255,255,255,0.15)',
      background:'#fff',
      display:'flex', alignItems:'center', justifyContent:'center',
    });
    const img = document.createElement('img');
    img.src = logo;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover';
    wrap.appendChild(img);
    return wrap;
  }
  return av(nome, size);
}

/* Avatar para USUÁRIO — mostra foto de perfil se disponível */
function avUser(userId, nome, size=36) {
  const photoKey = 'userPhoto_'+userId;
  const photo = localStorage.getItem(photoKey);
  if(photo){
    const wrap = div({
      width:size+'px', height:size+'px', borderRadius:'50%',
      overflow:'hidden', flexShrink:0,
      border:'1px solid rgba(29,233,182,0.3)',
    });
    const img = document.createElement('img');
    img.src = photo;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover';
    wrap.appendChild(img);
    return wrap;
  }
  return av(nome, size);
}


/* ── DOM HELPERS ── */
function el(tag,props,...ch){
  const e=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat(9).forEach(c=>{if(c==null||c===false||c===undefined)return;if(typeof c==='string'||typeof c==='number')e.appendChild(document.createTextNode(String(c)));else if(c instanceof Node)e.appendChild(c);});
  return e;
}
const div=(style,...ch)=>el('div',{style},...ch);
const span=(t,style)=>el('span',{style},t);
const p2=(t,style)=>el('p',{style},t);

function badge(s){const c=ST[s]||ST.lead;return span(c.l,{fontSize:'11px',fontWeight:700,padding:'3px 10px',borderRadius:'20px',background:c.bc,color:c.tc,whiteSpace:'nowrap'});}
function badgeInd(s){const c=IND[s]||IND.aguardando;return span(c.ic+' '+c.l,{fontSize:'11px',fontWeight:700,padding:'3px 10px',borderRadius:'20px',background:c.bc,color:c.tc,whiteSpace:'nowrap'});}
function av(name,size=36){return div({width:size+'px',height:size+'px',borderRadius:'50%',background:B.bronze+'33',border:'1px solid '+B.bronze+'55',color:B.bronze,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:(size>40?15:11)+'px',fontWeight:700,fontFamily:CI},ini(name));}
function card(ch=[],style={}){return div({background:B.surface,borderRadius:'10px',border:'1px solid '+B.border,padding:'16px 18px',...style},...(Array.isArray(ch)?ch:[ch]));}
function secTitle(label,color=B.bronze){return div({display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',paddingBottom:'10px',borderBottom:'1px solid '+B.border},div({width:'3px',height:'14px',borderRadius:'2px',background:color,flexShrink:0}),span(label,{fontFamily:CI,fontSize:'10px',fontWeight:700,color,textTransform:'uppercase',letterSpacing:'.8px'}));}
function lbl(text,req=false){const l=el('label',{style:{display:'block',fontSize:'10px',fontWeight:700,color:B.muted,textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'4px',fontFamily:PH}},text);if(req)l.appendChild(span(' *',{color:B.bad}));return l;}
function row(label,value){return div({display:'flex',padding:'6px 0',borderBottom:'1px solid '+B.border},div({width:'44%',fontSize:'10px',color:B.muted,textTransform:'uppercase',letterSpacing:'.3px'},label),div({flex:1,fontSize:'12px',color:B.text,fontWeight:500},value||'—'));}

function btn(label,onClick,variant='primary',disabled=false,style={}){
  const base={border:'none',borderRadius:'8px',padding:'9px 18px',cursor:disabled?'not-allowed':'pointer',fontFamily:CI,fontSize:'11px',fontWeight:700,letterSpacing:'.5px',opacity:disabled?.5:1,...style};
  let bg=B.bronze,clr=B.bg,brd='none';
  if(variant==='ghost'){bg='none';clr=B.muted;brd='1px solid '+B.blt;base.fontFamily=PH;base.fontWeight=400;base.fontSize='12px';}
  if(variant==='danger'){bg=B.bad+'22';clr=B.bad;brd='1px solid '+B.bad+'55';}
  if(variant==='outline'){bg='none';clr=B.bronze;brd='1px solid '+B.bronze+'55';}
  const b=el('button',{style:{...base,background:bg,color:clr,border:brd}},label);
  if(!disabled)b.onclick=onClick;
  return b;
}
function inputEl(value,onChange,type='text',placeholder='',style={}){
  const e=el('input',{type,placeholder,value:value||'',style:{width:'100%',padding:'8px 10px',borderRadius:'7px',boxSizing:'border-box',border:'1px solid '+B.blt,background:B.bg,color:B.text,fontSize:'13px',fontFamily:PH,outline:'none',...style}});
  e.oninput=ev=>onChange(ev.target.value);
  return e;
}
function selEl(value,options,onChange,style={}){
  const e=el('select',{style:{width:'100%',padding:'8px 10px',borderRadius:'7px',border:'1px solid '+B.blt,background:B.bg,color:value?B.text:B.muted,fontSize:'13px',fontFamily:PH,outline:'none',cursor:'pointer',boxSizing:'border-box',...style}});
  e.appendChild(el('option',{value:''},'Selecione...'));
  options.forEach(o=>{const opt=el('option',{value:o.v||o},o.l||o);if((o.v||o)===value)opt.selected=true;e.appendChild(opt);});
  e.onchange=ev=>onChange(ev.target.value);
  return e;
}

/* ── USUARIOS ── */
function calcComissao(nContratos){
  /* Regras:
     01-05: R$ 200 por contrato
     06+  : R$ 500 por contrato
     Bônus: +R$ 1.000 a cada 10 contratos completos
  */
  if(!nContratos||nContratos<=0) return {total:0,faixa1:0,faixa2:0,bonus:0,detalhes:[]};
  const f1 = Math.min(nContratos, 5);
  const f2 = Math.max(nContratos - 5, 0);
  const bonus = Math.floor(nContratos / 10);
  const v1 = f1 * 200;
  const v2 = f2 * 500;
  const vb = bonus * 1000;
  const total = v1 + v2 + vb;
  const detalhes = [];
  if(f1 > 0) detalhes.push({label:`Contratos 01–${f1.toString().padStart(2,'0')} (${f1}×R$200)`, valor:v1, cor:'#1de9b6'});
  if(f2 > 0) detalhes.push({label:`Contratos 06–${nContratos.toString().padStart(2,'0')} (${f2}×R$500)`, valor:v2, cor:'#4680ff'});
  if(vb > 0) detalhes.push({label:`Bônus (${bonus}×R$1.000)`, valor:vb, cor:'#f7c321'});
  return {total, faixa1:v1, faixa2:v2, bonus:vb, detalhes};
}

function AcoesNovas(){
  const fmtR = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
  const admin_ = isAdmin(user);

  // Leads com contrato assinado
  const assinados = LEADS.filter(l => l.status === 'convertido')
    .map(l => ({
      ...l,
      advogado_id: l.advogado_id || null,
      advogado_nome: l.advogado_nome || null,
      peticao_status: l.peticao_status || 'pendente', // pendente|em_andamento|concluida
    }));

  // Lista de advogados cadastrados
  const advogados = USERS.filter(u => u.role === 'advogado');

  const cont = div({animation:'fadeIn .35s ease'});

  // ── Header ──────────────────────────────────────────────────────────────
  cont.appendChild(el('h1',{style:{margin:'0 0 4px',fontSize:'20px',fontWeight:700,
    fontFamily:CI,background:'linear-gradient(90deg,#38bdf8,#1de9b6)',
    WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},
    '⚖ Ações Novas'));
  cont.appendChild(el('p',{style:{margin:'0 0 16px',color:B.muted,fontSize:'12px'}},
    'Contratos assinados — atribuição de petições iniciais por advogado'));

  // ── Cards de resumo ──────────────────────────────────────────────────────
  const kpiRow = div({display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',marginBottom:'16px'});
  const pendentes   = assinados.filter(l => l.peticao_status === 'pendente').length;
  const andamento   = assinados.filter(l => l.peticao_status === 'em_andamento').length;
  const concluidas  = assinados.filter(l => l.peticao_status === 'concluida').length;
  const semAdv      = assinados.filter(l => !l.advogado_id).length;

  [{v:assinados.length,l:'Total de Contratos',c:'#1de9b6',sub:'contratos assinados'},
   {v:semAdv,          l:'Sem Advogado',       c:'#f7c321',sub:'aguardando atribuição'},
   {v:andamento,       l:'Em Andamento',       c:'#4680ff',sub:'petições em elaboração'},
   {v:concluidas,      l:'Concluídas',         c:'#86efac',sub:'petições protocoladas'},
  ].forEach(k=>{
    kpiRow.appendChild(div({background:B.surface,borderRadius:'12px',
      border:'1px solid '+B.border,borderTop:`2.5px solid ${k.c}`,
      padding:'12px 14px',textAlign:'center'},
      div({fontSize:'10px',color:B.muted,textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'4px'},k.l),
      div({fontFamily:CI,fontSize:'26px',fontWeight:700,color:k.c,lineHeight:1.1},String(k.v)),
      div({fontSize:'11px',color:B.muted,marginTop:'3px'},k.sub)
    ));
  });
  cont.appendChild(kpiRow);

  // ── Lista de ações ────────────────────────────────────────────────────────
  if(!assinados.length){
    cont.appendChild(div({background:B.surface,borderRadius:'12px',border:'1px solid '+B.border,
      padding:'40px',textAlign:'center'},
      div({fontSize:'40px',marginBottom:'12px'},'⚖'),
      div({fontSize:'14px',color:B.muted},'Nenhum contrato assinado ainda.'),
      div({fontSize:'12px',color:B.dim,marginTop:'6px'},'As ações novas aparecem aqui quando o status for "Contrato Assinado".')
    ));
    return cont;
  }

  // Cabeçalho da tabela
  const sec = div({background:B.surface,borderRadius:'12px',border:'1px solid '+B.border,overflow:'hidden'});
  sec.appendChild(div({padding:'10px 16px',borderBottom:'1px solid '+B.border,
    display:'flex',alignItems:'center',gap:'8px'},
    div({width:'3px',height:'14px',borderRadius:'2px',background:'#38bdf8',flexShrink:0}),
    el('span',{style:{fontFamily:CI,fontSize:'10px',fontWeight:700,color:'#38bdf8',
      textTransform:'uppercase',letterSpacing:'.8px'}},'Contratos assinados — distribuição de petições')
  ));

  const tb = el('table',{style:{width:'100%',borderCollapse:'collapse'}});
  const thead = el('thead'), hrow = el('tr',{style:{borderBottom:'1px solid '+B.border}});
  ['Cliente','Banco / Cargo','Salário','Atribuído a','Status Petição','Ações'].forEach(c=>{
    hrow.appendChild(el('th',{style:{padding:'8px 12px',textAlign:'left',fontSize:'10px',
      fontWeight:700,color:B.muted,textTransform:'uppercase',letterSpacing:'.5px'}},c));
  });
  thead.appendChild(hrow); tb.appendChild(thead);
  const tbody = el('tbody');

  const STATUS_PET = {
    pendente:     {l:'Pendente',     c:'#f7c321', bc:'rgba(247,195,33,.15)'},
    em_andamento: {l:'Em andamento', c:'#4680ff', bc:'rgba(70,128,255,.15)'},
    concluida:    {l:'Concluída',    c:'#86efac', bc:'rgba(134,239,172,.15)'},
  };

  assinados.forEach(lead=>{
    const tr = el('tr',{style:{borderBottom:'1px solid '+B.border}});
    tr.onmouseover = ()=>tr.style.background='rgba(255,255,255,0.03)';
    tr.onmouseout  = ()=>tr.style.background='transparent';

    // Cliente
    tr.appendChild(el('td',{style:{padding:'10px 12px'}},
      div({display:'flex',alignItems:'center',gap:'8px'},
        avLead(lead.nome,lead.banco,30),
        div({},
          div({fontSize:'12px',fontWeight:600,color:B.text},lead.nome),
          lead.parceiro_nome?el('span',{style:{fontSize:'9px',color:B.muted}},'🔗 '+lead.parceiro_nome):''
        )
      )
    ));

    // Banco / Cargo
    const logo = getBankLogo(lead.banco);
    tr.appendChild(el('td',{style:{padding:'10px 12px'}},
      div({display:'flex',alignItems:'center',gap:'6px'},
        logo?(()=>{const img=document.createElement('img');img.src=logo;img.style.cssText='width:18px;height:18px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,.15)';return img;})():'',
        div({},
          div({fontSize:'12px',color:B.text},lead.banco||'—'),
          div({fontSize:'10px',color:B.muted},lead.cargo||'—')
        )
      )
    ));

    // Salário
    tr.appendChild(el('td',{style:{padding:'10px 12px',fontFamily:CI,fontSize:'12px',color:B.text}},
      lead.salario ? fmtR(lead.salario) : '—'));

    // Atribuído a — select de advogados (admin) ou texto (outros)
    const advCell = el('td',{style:{padding:'10px 12px'}});
    if(admin_){
      const sel = document.createElement('select');
      sel.style.cssText = 'background:rgba(255,255,255,0.06);border:1px solid rgba(56,189,248,0.3);'+
        'border-radius:7px;padding:5px 9px;font-size:11px;color:#38bdf8;'+
        'font-family:Inter,sans-serif;outline:none;cursor:pointer;min-width:130px';
      const optVazio = document.createElement('option');
      optVazio.value=''; optVazio.textContent='— Não atribuído —'; sel.appendChild(optVazio);
      advogados.forEach(adv=>{
        const opt = document.createElement('option');
        opt.value = adv.id; opt.textContent = adv.nome;
        if(adv.id === lead.advogado_id) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.onchange = e=>{
        const adv = advogados.find(a=>a.id===e.target.value)||null;
        upd(lead.id,{
          advogado_id:   adv?.id   || null,
          advogado_nome: adv?.nome || null,
        });
      };
      advCell.appendChild(sel);
    } else {
      advCell.appendChild(el('span',{style:{fontSize:'12px',color:lead.advogado_nome?'#38bdf8':B.dim}},
        lead.advogado_nome || '—'));
    }
    tr.appendChild(advCell);

    // Status da petição — select (admin/advogado) ou badge
    const petCell = el('td',{style:{padding:'10px 12px'}});
    const stpet = STATUS_PET[lead.peticao_status||'pendente'];
    if(admin_||isAdvogado(user)){
      const selPet = document.createElement('select');
      selPet.style.cssText = `background:${stpet.bc};border:1px solid ${stpet.c}55;`+
        'border-radius:7px;padding:5px 9px;font-size:11px;font-family:Inter,sans-serif;outline:none;cursor:pointer;min-width:130px;';
      selPet.style.color = stpet.c;
      Object.entries(STATUS_PET).forEach(([k,v])=>{
        const opt = document.createElement('option');
        opt.value=k; opt.textContent=v.l;
        if(k===(lead.peticao_status||'pendente')) opt.selected=true;
        selPet.appendChild(opt);
      });
      selPet.onchange = e=>{
        upd(lead.id,{peticao_status:e.target.value});
        // Re-estiliza o select
        const ns = STATUS_PET[e.target.value];
        selPet.style.background = ns.bc;
        selPet.style.borderColor = ns.c+'55';
        selPet.style.color = ns.c;
      };
      petCell.appendChild(selPet);
    } else {
      petCell.appendChild(el('span',{style:{fontSize:'11px',fontWeight:700,
        padding:'3px 10px',borderRadius:'20px',background:stpet.bc,color:stpet.c}},stpet.l));
    }
    tr.appendChild(petCell);

    // Ações — botão Relatório de Atendimento
    const actCell = el('td',{style:{padding:'10px 12px'}});
    const relBtn = el('button',{style:{
      background:'rgba(56,189,248,0.1)',border:'1px solid rgba(56,189,248,0.3)',
      borderRadius:'7px',padding:'5px 11px',fontSize:'11px',color:'#38bdf8',
      fontFamily:'Inter,sans-serif',cursor:'pointer',whiteSpace:'nowrap',
      transition:'all .15s'
    }},'📋 Relatório');
    relBtn.onmouseover = ()=>relBtn.style.background='rgba(56,189,248,0.2)';
    relBtn.onmouseout  = ()=>relBtn.style.background='rgba(56,189,248,0.1)';
    relBtn.onclick = ()=>nav('op_ia');
    actCell.appendChild(relBtn);
    tr.appendChild(actCell);

    tbody.appendChild(tr);
  });

  tb.appendChild(tbody); sec.appendChild(tb); cont.appendChild(sec);

  // ── Nota de rodapé ────────────────────────────────────────────────────────
  cont.appendChild(div({marginTop:'14px',padding:'12px 16px',
    background:'rgba(56,189,248,0.04)',borderRadius:'8px',
    border:'1px solid rgba(56,189,248,0.12)',fontSize:'12px',color:B.muted},
    '📌 ',
    el('strong',{style:{color:'#38bdf8'}},'Fluxo: '),
    'Contrato assinado → Admin atribui ao Advogado → Advogado elabora a petição inicial com apoio do Relatório de Atendimento → Status: Em andamento → Concluída.'
  ));
  return cont;
}

/* ════════════════════════════════════════════════════════

function TrocarSenha(){
  const wrap = div({minHeight:'100vh',width:'100%',background:B.bg,display:'flex',
    alignItems:'center',justifyContent:'center',padding:'20px'});

  const card_ = div({
    width:'100%',maxWidth:'420px',
    background:'linear-gradient(160deg,rgba(30,39,64,.97),rgba(26,34,56,.97))',
    border:'1px solid rgba(255,255,255,.1)',borderRadius:'16px',overflow:'hidden',
    boxShadow:'0 30px 80px rgba(0,0,0,.7)',animation:'slideUp .5s ease',
  });

  // Barra colorida no topo
  card_.appendChild(div({height:'3px',
    background:'linear-gradient(90deg,#86efac,#1de9b6,#4680ff,#1de9b6,#86efac)'}));

  const body_ = div({padding:'32px 34px 28px'});

  // Logo e header
  const logoDiv = div({textAlign:'center',marginBottom:'20px'});
  const logoImg = document.createElement('img');
  logoImg.src = LOGO_C;
  logoImg.style.cssText = 'max-width:180px;width:100%;filter:drop-shadow(0 0 10px rgba(134,239,172,.25)) brightness(1.05)';
  logoDiv.appendChild(logoImg);
  body_.appendChild(logoDiv);

  body_.appendChild(div({textAlign:'center',marginBottom:'6px',
    fontFamily:CI,fontSize:'16px',fontWeight:700,
    background:'linear-gradient(90deg,#86efac,#1de9b6)',
    WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'},
    '🔐 Primeiro Acesso'));
  body_.appendChild(div({textAlign:'center',marginBottom:'20px',
    fontSize:'12px',color:B.muted,lineHeight:'1.7'},
    'Bem-vindo, ',el('strong',{style:{color:'#86efac'}},user.nome.split(' ')[0]),'!',
    el('br'),
    'Crie sua senha definitiva para continuar.'));

  body_.appendChild(div({height:'.5px',
    background:'linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)',
    marginBottom:'20px'}));

  // Aviso de segurança
  const aviso = div({padding:'10px 14px',background:'rgba(134,239,172,0.06)',
    borderRadius:'8px',border:'1px solid rgba(134,239,172,0.15)',
    fontSize:'11px',color:B.muted,marginBottom:'20px'});
  aviso.innerHTML='&#128273; Sua senha é <strong style="color:#86efac">pessoal e intransferível</strong>. Use 6 dígitos numéricos. Não compartilhe com ninguém.';
  body_.appendChild(aviso);

  // ── Campo: Nova Senha ──
  body_.appendChild(el('label',{style:{display:'block',fontSize:'10px',fontWeight:600,
    color:'#86efac',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'7px'}},
    'Nova Senha (6 dígitos)'));
  const row1 = div({display:'flex',gap:'8px',marginBottom:'16px'});
  const dNew = [];
  for(let i=0;i<6;i++){
    const d=document.createElement('input');
    d.setAttribute('type','password');d.setAttribute('maxlength','1');
    d.setAttribute('inputmode','numeric');
    d.style.cssText='width:48px;height:52px;text-align:center;font-size:22px;font-weight:700;'+
      'font-family:Cinzel,serif;border-radius:9px;'+
      'border:1.5px solid rgba(255,255,255,.12);'+
      'background:rgba(255,255,255,.05);color:#86efac;outline:none;transition:all .2s;box-sizing:border-box';
    d.addEventListener('keydown',e=>{
      if(e.key==='Backspace'){e.preventDefault();d.value='';
        d.style.borderColor='rgba(255,255,255,.12)';d.style.background='rgba(255,255,255,.05)';
        if(i>0)dNew[i-1].focus();}
      else if(/^[0-9]$/.test(e.key)){e.preventDefault();d.value=e.key;
        d.style.borderColor='#86efac';d.style.background='rgba(134,239,172,.1)';
        if(i<5)dNew[i+1].focus();}
    });
    dNew.push(d);row1.appendChild(d);
  }
  body_.appendChild(row1);

  // ── Campo: Confirmar Senha ──
  body_.appendChild(el('label',{style:{display:'block',fontSize:'10px',fontWeight:600,
    color:'#4680ff',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'7px'}},
    'Confirmar Senha'));
  const row2 = div({display:'flex',gap:'8px',marginBottom:'20px'});
  const dConf = [];
  for(let i=0;i<6;i++){
    const d=document.createElement('input');
    d.setAttribute('type','password');d.setAttribute('maxlength','1');
    d.setAttribute('inputmode','numeric');
    d.style.cssText='width:48px;height:52px;text-align:center;font-size:22px;font-weight:700;'+
      'font-family:Cinzel,serif;border-radius:9px;'+
      'border:1.5px solid rgba(255,255,255,.12);'+
      'background:rgba(255,255,255,.05);color:#4680ff;outline:none;transition:all .2s;box-sizing:border-box';
    d.addEventListener('keydown',e=>{
      if(e.key==='Backspace'){e.preventDefault();d.value='';
        d.style.borderColor='rgba(255,255,255,.12)';d.style.background='rgba(255,255,255,.05)';
        if(i>0)dConf[i-1].focus();}
      else if(/^[0-9]$/.test(e.key)){e.preventDefault();d.value=e.key;
        d.style.borderColor='#4680ff';d.style.background='rgba(70,128,255,.1)';
        if(i<5)dConf[i+1].focus();}
    });
    dConf.push(d);row2.appendChild(d);
  }
  body_.appendChild(row2);

  // ── Erro ──
  const errMsg = div({display:'none',marginBottom:'12px',padding:'8px 14px',
    background:'rgba(244,67,54,.1)',borderRadius:'8px',
    border:'1px solid rgba(244,67,54,.3)',fontSize:'12px',color:B.bad,textAlign:'center'});
  body_.appendChild(errMsg);

  // ── Botão ──
  const confBtn = el('button',{
    style:{width:'100%',padding:'13px',borderRadius:'10px',border:'none',
      background:'linear-gradient(135deg,#86efac,#1de9b6)',
      color:'#1c2333',fontFamily:CI,fontSize:'12px',fontWeight:700,
      letterSpacing:'.8px',cursor:'pointer',
      boxShadow:'0 4px 20px rgba(134,239,172,0.3)',transition:'all .2s'},
  },'✓ Definir Senha e Entrar');

  confBtn.onmouseover = ()=>confBtn.style.transform='translateY(-1px)';
  confBtn.onmouseout  = ()=>confBtn.style.transform='none';

  confBtn.onclick = ()=>{
    const nova  = dNew.map(d=>d.value).join('');
    const conf  = dConf.map(d=>d.value).join('');
    if(nova.length!==6){
      errMsg.textContent='Preencha todos os 6 dígitos da nova senha.';
      errMsg.style.display='block'; return;}
    if(!/^[0-9]{6}$/.test(nova)){
      errMsg.textContent='A senha deve conter apenas números.';
      errMsg.style.display='block'; return;}
    if(nova===user.senha){
      errMsg.textContent='A nova senha não pode ser igual à senha provisória.';
      errMsg.style.display='block'; return;}
    if(nova!==conf){
      errMsg.textContent='As senhas não coincidem. Tente novamente.';
      errMsg.style.display='block';
      dConf.forEach(d=>{d.value='';d.style.borderColor='rgba(244,67,54,.5)';
        d.style.background='rgba(244,67,54,.08)';});
      dConf[0].focus(); return;}
    // Atualiza senha e remove flag de primeiro acesso
    const idx = USERS.findIndex(u=>u.id===user.id);
    if(idx>=0){USERS[idx].senha=nova;USERS[idx].primeiroAcesso=false;}
    user.senha = nova;
    user.primeiroAcesso = false;
    errMsg.style.display='none';
    // Feedback de sucesso
    confBtn.textContent='✓ Senha definida! Redirecionando...';
    confBtn.style.background='linear-gradient(135deg,#22c55e,#16a34a)';
    setTimeout(()=>render(), 800);
  };

  body_.appendChild(confBtn);

  body_.appendChild(div({marginTop:'14px',textAlign:'center',fontSize:'10px',color:B.dim},
    'Evangelista de Souza Advogados · OAB/SP 255.932'));

  card_.appendChild(body_);
  wrap.appendChild(card_);
  return wrap;
}

          RLBL[u.role]||u.role)
      ));

      tr.appendChild(el('td',{style:{padding:'8px 12px',fontSize:'11px',color:B.muted}},u.email));
      tr.appendChild(el('td',{style:{padding:'8px 12px',fontSize:'11px',color:B.muted}},
        u.contratacao||'—'));

      // Upload foto
      const photoCell=el('td',{style:{padding:'8px 12px'}});
      const hasPhoto=!!localStorage.getItem(photoKey);
      const lbl=document.createElement('label');
      lbl.style.cssText='cursor:pointer;display:inline-flex;align-items:center;gap:5px;'+
        'background:rgba(70,128,255,0.1);border:1px solid rgba(70,128,255,0.3);'+
        'border-radius:7px;padding:4px 10px;font-size:11px;color:#4680ff;';
      lbl.innerHTML=hasPhoto?'&#128247; Trocar':'&#128247; Foto';
      const inp=document.createElement('input');
      inp.setAttribute('type','file');inp.setAttribute('accept','image/*');inp.style.display='none';
      inp.onchange=ev=>{
        const file=ev.target.files[0];if(!file)return;
        if(file.size>2*1024*1024){alert('Máximo 2 MB.');return;}
        const reader=new FileReader();
        reader.onload=e2=>{localStorage.setItem(photoKey,e2.target.result);render();};
        reader.readAsDataURL(file);
      };
      lbl.appendChild(inp);
      photoCell.appendChild(lbl);
      if(hasPhoto){
        const rmv=el('button',{style:{background:'none',border:'none',cursor:'pointer',
          color:B.bad,fontSize:'12px',padding:'2px 5px'}},'✕');
        rmv.onclick=()=>{localStorage.removeItem(photoKey);render();};
        photoCell.appendChild(rmv);
      }
      tr.appendChild(photoCell);
      tbody.appendChild(tr);
    });
    t.appendChild(tbody);tb.appendChild(t);cont.appendChild(tb);
  });

  // Botão novo usuário
  const addBtn = div({textAlign:'center',marginTop:'8px'});
  addBtn.appendChild(el('button',{
    style:{background:'linear-gradient(135deg,#1de9b6,#4680ff)',border:'none',
      borderRadius:'10px',padding:'11px 28px',color:'#1c2333',fontFamily:CI,
      fontSize:'12px',fontWeight:700,letterSpacing:'.5px',cursor:'pointer',
      boxShadow:'0 4px 16px rgba(29,233,182,0.25)'},
    onclick:()=>nav('novo_usuario')
  },'+ Incluir Novo Usuário'));
  cont.appendChild(addBtn);
  return cont;
}

/* ════════════════════════════════════════════════════════
   FORMULÁRIO NOVO USUÁRIO (Admin)
════════════════════════════════════════════════════════ */
function NovoUsuarioAdmin(){

    {v:'coordenador',   l:'Coordenador',    cat:'Operacional'},
    {v:'financeiro',    l:'Financeiro',     cat:'Operacional'},
    {v:'sdr',           l:'SDR',            cat:'Comercial'},
    {v:'closer',        l:'CLOSER',         cat:'Comercial'},
  ];
  const CONTRATACOES = ['CLT','PJ — Pessoa Jurídica','Estagiário','Autônomo','Temporário','Sócio'];

  let f = {
    role:'', nome:'', cpf:'', rg:'', endereco:'', cidade:'', estado:'',
    celular:'', email:'', contratacao:'', banco:'', agencia:'', conta:'', senha:''
  };
  const set = (k,v) => { f[k]=v; };
  let saving = false;

  const cont = div({animation:'fadeIn .35s ease'});
  const voltar = () => nav('ger_usuarios');

  const backBtn = el('button',{style:{background:'none',border:'none',color:B.muted,
    cursor:'pointer',fontSize:'12px',fontFamily:CI,padding:0,marginBottom:'14px',
    display:'flex',alignItems:'center',gap:'4px'},onclick:voltar},
    '← Voltar para Gerenciar Usuários');
  cont.appendChild(backBtn);

  cont.appendChild(el('h1',{style:{margin:'0 0 4px',fontSize:'20px',fontWeight:700,
    fontFamily:CI,background:'linear-gradient(90deg,#e8d5a3,#4680ff)',
    WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},'➕ Novo Usuário'));
  cont.appendChild(el('p',{style:{margin:'0 0 16px',color:B.muted,fontSize:'12px'}},
    'Preencha os dados do novo usuário do sistema'));

  const formCard = div({background:B.surface,borderRadius:'12px',
    border:'1px solid '+B.border,padding:'22px 24px'});

  const inp_s = {width:'100%',padding:'9px 11px',borderRadius:'8px',
    border:'1px solid rgba(255,255,255,0.12)',background:'rgba(255,255,255,0.05)',
    color:B.text,fontSize:'13px',fontFamily:'Inter,sans-serif',
    outline:'none',boxSizing:'border-box'};

  function secHdr(label,cor='#1de9b6'){
    return div({display:'flex',alignItems:'center',gap:'8px',
      margin:'18px 0 12px',paddingBottom:'8px',borderBottom:'1px solid '+B.border},
      div({width:'3px',height:'14px',borderRadius:'2px',background:cor,flexShrink:0}),
      el('span',{style:{fontFamily:CI,fontSize:'10px',fontWeight:700,color:cor,
        textTransform:'uppercase',letterSpacing:'.8px'}},label));
  }

  function field(label,key,type='text',opts=null,required=false){
    const wrap = div({marginBottom:'0'});
    wrap.appendChild(el('label',{style:{display:'block',fontSize:'10px',fontWeight:600,
      color:B.muted,textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'4px'}},
      label+(required?' *':'')));

    if(opts && Array.isArray(opts)){
      const sel = document.createElement('select');
      Object.assign(sel.style, inp_s);
      sel.style.cursor='pointer';
      const emptyOpt = document.createElement('option');
      emptyOpt.value=''; emptyOpt.textContent='Selecione...';
      sel.appendChild(emptyOpt);
      opts.forEach(o=>{
        const opt=document.createElement('option');
        opt.value=o.v||o; opt.textContent=o.l||o;
        sel.appendChild(opt);
      });
      sel.value = f[key]||'';
      sel.onchange = e=>set(key,e.target.value);
      wrap.appendChild(sel);
    } else {
      const input = el('input',{type,style:inp_s,
        placeholder:'',value:f[key]||''});
      input.oninput = e=>set(key,e.target.value);
      if(type==='tel') input.setAttribute('inputmode','numeric');
      wrap.appendChild(input);
    }
    return wrap;
  }

  // ── SEÇÃO 1: CATEGORIA ────────────────────────────────────────────────
  formCard.appendChild(secHdr('1. Categoria do Usuário','#e8d5a3'));
  const catGrid = div({display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'8px',marginBottom:'6px'});
  CATEGORIAS.forEach(c=>{
    const btn_ = el('button',{style:{
      padding:'10px 8px',borderRadius:'9px',border:'1px solid '+B.border,
      background:'transparent',color:B.muted,fontSize:'11px',fontFamily:CI,
      fontWeight:700,cursor:'pointer',textAlign:'center',transition:'all .15s',
    }});
    const ic_ = div({fontSize:'18px',marginBottom:'4px'},
      c.v==='advogado'?'⚖':c.v==='estagiario'?'📚':c.v==='recepcionista'?'📋':
      c.v==='colaborador'?'👤':c.v==='coordenador'?'🎯':c.v==='financeiro'?'💼':
      c.v==='sdr'?'📞':'🤝');
    const lbl_ = div({fontSize:'10px',fontFamily:CI,fontWeight:700},c.l);
    const cat_ = div({fontSize:'9px',color:B.muted,marginTop:'2px'},c.cat);
    btn_.appendChild(ic_); btn_.appendChild(lbl_); btn_.appendChild(cat_);
    btn_.onclick = ()=>{
      set('role',c.v);
      catGrid.querySelectorAll('button').forEach(b=>{
        b.style.borderColor=B.border; b.style.background='transparent';
        b.style.color=B.muted;
      });
      btn_.style.borderColor='#1de9b6'; btn_.style.background='rgba(29,233,182,0.08)';
      btn_.style.color='#1de9b6';
    };
    catGrid.appendChild(btn_);
  });
  formCard.appendChild(catGrid);

  // ── SEÇÃO 2: DADOS PESSOAIS ────────────────────────────────────────────
  formCard.appendChild(secHdr('2. Dados Pessoais','#4680ff'));
  const pesGrid = div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px 16px'});
  [
    {l:'Nome Completo',k:'nome',full:true,req:true},
    {l:'CPF',          k:'cpf', ph:'000.000.000-00'},
    {l:'RG',           k:'rg'},
    {l:'Celular / WhatsApp',k:'celular',type:'tel'},
    {l:'E-mail',       k:'email',type:'email',req:true},
  ].forEach(({l,k,type='text',full=false,req=false})=>{
    const w = field(l,k,type,null,req);
    if(full) w.style.gridColumn='1/-1';
    pesGrid.appendChild(w);
  });
  formCard.appendChild(pesGrid);

  // ── SEÇÃO 3: ENDEREÇO ─────────────────────────────────────────────────
  formCard.appendChild(secHdr('3. Endereço','#a389d4'));
  const endGrid = div({display:'grid',gridTemplateColumns:'1fr 1fr 80px',gap:'12px 16px'});
  const endFull = field('Endereço','endereco');
  endFull.style.gridColumn='1/-1';
  endGrid.appendChild(endFull);
  endGrid.appendChild(field('Cidade','cidade'));
  const estadoField = field('Estado','estado','text',ESTADOS_BR.map(e=>({v:e,l:e})));
  endGrid.appendChild(estadoField);
  endGrid.appendChild(div({})); // espaço
  formCard.appendChild(endGrid);

  // ── SEÇÃO 4: CONTRATAÇÃO ─────────────────────────────────────────────
  formCard.appendChild(secHdr('4. Forma de Contratação','#f7c321'));
  const contGrid = div({display:'grid',gridTemplateColumns:'1fr',gap:'12px'});
  contGrid.appendChild(field('Forma de Contratação','contratacao','text',
    CONTRATACOES.map(c=>({v:c,l:c}))));
  formCard.appendChild(contGrid);

  // ── SEÇÃO 5: DADOS BANCÁRIOS ──────────────────────────────────────────
  formCard.appendChild(secHdr('5. Dados Bancários','#38bdf8'));
  const bancGrid = div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px 16px'});
  bancGrid.appendChild(field('Banco',  'banco'));
  bancGrid.appendChild(field('Agência','agencia','tel'));
  bancGrid.appendChild(field('Conta',  'conta','tel'));
  formCard.appendChild(bancGrid);

  // ── SEÇÃO 6: ACESSO AO SISTEMA ────────────────────────────────────────
  formCard.appendChild(secHdr('6. Acesso ao Sistema','#86efac'));

  const acessoGrid = div({display:'grid',gridTemplateColumns:'1fr',gap:'12px'});

  const emailNote = div({padding:'8px 14px',background:'rgba(134,239,172,0.05)',
    borderRadius:'8px',border:'1px solid rgba(134,239,172,0.12)',
    fontSize:'11px',color:B.muted});
  emailNote.innerHTML='&#128273; O e-mail cadastrado em "Dados Pessoais" será o <strong style="color:#86efac">login de acesso</strong>. Crie uma senha provisória numérica de 6 dígitos abaixo.';
  acessoGrid.appendChild(emailNote);

  // Campo senha provisória — 6 dígitos individuais
  const senhaWrap2 = div({});
  senhaWrap2.appendChild(el('label',{style:{display:'block',fontSize:'10px',fontWeight:600,
    color:'#86efac',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'8px'}},
    'Senha Provisória — 6 dígitos numéricos *'));
  const digitRow2 = div({display:'flex',gap:'8px',alignItems:'center'});
  const dEls2 = [];
  for(let i=0;i<6;i++){
    const d2 = document.createElement('input');
    d2.setAttribute('type','password');d2.setAttribute('maxlength','1');
    d2.setAttribute('inputmode','numeric');
    d2.style.cssText='width:48px;height:52px;text-align:center;font-size:22px;font-weight:700;'+
      'font-family:Cinzel,serif;border-radius:9px;'+
      'border:1.5px solid rgba(255,255,255,0.12);'+
      'background:rgba(255,255,255,0.05);color:#86efac;outline:none;'+
      'transition:all .2s;box-sizing:border-box';
    d2.addEventListener('keydown',ev2=>{
      if(ev2.key==='Backspace'){ev2.preventDefault();d2.value='';
        d2.style.borderColor='rgba(255,255,255,0.12)';
        d2.style.background='rgba(255,255,255,0.05)';
        if(i>0)dEls2[i-1].focus();}
      else if(/^[0-9]$/.test(ev2.key)){ev2.preventDefault();d2.value=ev2.key;
        d2.style.borderColor='#86efac';d2.style.background='rgba(134,239,172,0.1)';
        set('senha',dEls2.map(x=>x.value).join(''));
        if(i<5)dEls2[i+1].focus();}
    });
    d2.addEventListener('paste',ev2=>{ev2.preventDefault();
      const pd=ev2.clipboardData.getData('text').replace(/[^0-9]/g,'').slice(0,6);
      pd.split('').forEach((c,j)=>{if(dEls2[j]){dEls2[j].value=c;
        dEls2[j].style.borderColor='#86efac';
        dEls2[j].style.background='rgba(134,239,172,0.1)';}});
      set('senha',pd);});
    dEls2.push(d2);digitRow2.appendChild(d2);
  }
  senhaWrap2.appendChild(digitRow2);
  senhaWrap2.appendChild(div({marginTop:'6px',fontSize:'10px',color:B.dim},
    'O usuário será solicitado a criar uma senha definitiva no primeiro acesso ao sistema.'));
  acessoGrid.appendChild(senhaWrap2);
  formCard.appendChild(acessoGrid);

    // ── ERRO ──────────────────────────────────────────────────────────────
  const errDiv = div({display:'none',marginTop:'12px',padding:'10px 14px',
    background:'rgba(244,67,54,0.1)',borderRadius:'8px',
    border:'1px solid rgba(244,67,54,0.3)',fontSize:'12px',color:B.bad});
  formCard.appendChild(errDiv);

  // ── BOTÕES ────────────────────────────────────────────────────────────
  const footer = div({display:'flex',gap:'12px',justifyContent:'flex-end',
    marginTop:'20px',paddingTop:'16px',borderTop:'1px solid '+B.border});

  footer.appendChild(el('button',{
    style:{background:'transparent',border:'1px solid '+B.border,borderRadius:'8px',
      padding:'10px 20px',color:B.muted,fontFamily:'Inter,sans-serif',fontSize:'12px',cursor:'pointer'},
    onclick:voltar
  },'Cancelar'));

  const saveBtn = el('button',{
    style:{background:'linear-gradient(135deg,#1de9b6,#4680ff)',border:'none',
      borderRadius:'8px',padding:'10px 24px',color:'#1c2333',fontFamily:CI,
      fontSize:'11px',fontWeight:700,letterSpacing:'.5px',cursor:'pointer',
      boxShadow:'0 4px 14px rgba(29,233,182,0.25)',transition:'all .15s'},
  },'✓ Cadastrar Usuário');

  saveBtn.onclick = ()=>{
    if(!f.role){
      errDiv.textContent='Selecione a categoria do usuário.';
      errDiv.style.display='block'; return;
    }
    if(!f.nome||!f.nome.trim()){
      errDiv.textContent='Informe o nome completo.';
      errDiv.style.display='block'; return;
    }
    if(!f.email||!f.email.trim()){
      errDiv.textContent='Informe o e-mail de acesso.';
      errDiv.style.display='block'; return;
    }
    if(!f.senha||f.senha.length!==6||!/^[0-9]{6}$/.test(f.senha)){
      errDiv.textContent='Defina uma senha provisória numérica de 6 dígitos.';
      errDiv.style.display='block'; return;
    }
    if(USERS.find(u=>u.email.toLowerCase()===f.email.toLowerCase())){
      errDiv.textContent='Este e-mail já está cadastrado.';
      errDiv.style.display='block'; return;
    }
    errDiv.style.display='none';
    const novo = {
      id: 'u'+Date.now(),
      nome: f.nome.trim(),
      email: f.email.trim().toLowerCase(),
      senha: f.senha,
      role: f.role,
      cpf: f.cpf||'', rg: f.rg||'',
      endereco: f.endereco||'', cidade: f.cidade||'', estado: f.estado||'',
      celular: f.celular||'',
      contratacao: f.contratacao||'',
      banco: f.banco||'', agencia: f.agencia||'', conta: f.conta||'',
    };
    novo.primeiroAcesso = true;
    USERS.push(novo);
    // Feedback
    saveBtn.textContent='✓ Usuário cadastrado!';
    saveBtn.style.background='linear-gradient(135deg,#22c55e,#16a34a)';
    setTimeout(()=>nav('ger_usuarios'), 1000);
  };

  footer.appendChild(saveBtn);
  formCard.appendChild(footer);
  cont.appendChild(formCard);
  return cont;
}

    if(lead.admissao) preField('admissao', lead.admissao, true);
    if(lead.demissao) preField('rescisao', lead.demissao, true);
    if(lead.salario){
      preField('remuneracao',
        new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2}).format(lead.salario), true);
    }
  }

  /* Reconecta toggleCard para as seções da ficha */
  scroll.querySelectorAll('.card-header').forEach(function(ch){
    ch.onclick = function(){
      var card_el = ch.parentElement;
      card_el.classList.toggle('collapsed');
      var icon = ch.querySelector('.toggle-icon');
      if(icon) icon.textContent = card_el.classList.contains('collapsed') ? '\u25b8' : '\u25be';
    };
  });

  /* Botões de ação */
  document.getElementById('btn-salvar-ficha').onclick = function(){
    var form = scroll.querySelector('#fichaForm');
    if(!form) return;
    var data = {};
    form.querySelectorAll('input,select,textarea').forEach(function(el){
      if(!el.name) return;
      if(el.type==='checkbox'){ if(!data[el.name])data[el.name]=[]; if(el.checked)data[el.name].push(el.value); }
      else if(el.type==='radio'){ if(el.checked)data[el.name]=el.value; }
      else{ data[el.name]=el.value; }
    });
    data._savedAt = new Date().toLocaleString('pt-BR');
    data._leadId  = lead.id;
    localStorage.setItem('ficha_'+lead.id, JSON.stringify(data));
    var lbl2 = document.getElementById('ficha-saved-lbl');
    if(lbl2) lbl2.textContent = 'Salvo: '+data._savedAt;
    hdr.style.outline = '2px solid #b8972a';
    setTimeout(function(){ hdr.style.outline='none'; }, 1200);
  };

  document.getElementById('btn-json-ficha').onclick = function(){
    var raw  = localStorage.getItem('ficha_'+lead.id);
    var data = raw ? JSON.parse(raw) : {};
    var nome = (data.nome||lead.nome||'cliente').replace(/\s+/g,'_');
    var hoje = new Date().toISOString().slice(0,10);
    var blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href=url; a.download='ficha_'+nome+'_'+hoje+'.json'; a.click();
    URL.revokeObjectURL(url);
  };

  document.getElementById('btn-print-ficha').onclick = function(){
    var win = window.open('','_blank','width=1000,height=750');
    win.document.write('<!DOCTYPE html><html lang="pt-BR"><head>');
    win.document.write('<meta charset="UTF-8">');
    win.document.write('<title>Ficha de Atendimento - ' + lead.nome + '</title>');
    win.document.write('<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">');
    win.document.write('<style>' + FICHA_CSS + ' @media print{.form-actions{display:none}}</style>');
    win.document.write('</head><body>');
    win.document.write('<header class="page-header"><div class="header-brand"><h1>Evangelista de Souza Advogados</h1><p>OAB\/SP 255.932 - Direito Trabalhista Banc&#225;rio<\/p><\/div><div class="header-badge">Ficha de Atendimento<\/div><\/header>');
    win.document.write('<div class="form-wrapper">');
    var formEl = scroll.querySelector('#fichaForm');
    if(formEl) win.document.write(formEl.outerHTML);
    win.document.write('<\/div><\/body><\/html>');
    win.document.close();
    setTimeout(function(){ win.print(); }, 800);
  };
}

    placeholder:'Cole aqui o link de incorporação do Google Calendar...',

  const tagEntries=Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]);

  const topColors=[B.gold,B.bronze,B.info,B.warn,B.muted];
  LEADS.filter(l=>l.salario>0&&l.status!=='nao_qual').map(l=>({...l,score:calcTicketL(l)})).sort((a,b)=>b.score-a.score).slice(0,5).forEach((l,i)=>{

    img.style.cssText='width:16px;height:16px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,0.15);flex-shrink:0';

  w.appendChild(document.createTextNode((l.banco||'')+(l.cargo?' · '+l.cargo:'')));

})())));
    r.appendChild(div({textAlign:'right',flexShrink:0},div({fontSize:'12px',fontWeight:700,color:topColors[i],fontFamily:CI},fmt_(l.score)),div({fontSize:'9px',color:B.muted},'estimado')));

      new Chart(origCtx,{type:'doughnut',data:{labels:entries.map(e=>e[0]),datasets:[{data:entries.map(e=>e[1]),backgroundColor:cols.slice(0,entries.length),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}}}});

function Usuarios(){
  const cont=div({animation:'fadeIn .35s ease'});
  cont.appendChild(el('h1',{style:{margin:'0 0 4px',fontSize:'20px',fontWeight:700,fontFamily:CI,
    background:'linear-gradient(90deg,#1de9b6,#4680ff)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},'Usuários do Sistema'));
  cont.appendChild(el('p',{style:{margin:'0 0 16px',color:B.muted,fontSize:'12px'}},'Gerencie perfis, fotos e categorias dos usuários'));

  const CATS=[
    {id:'admin',    label:'Administrador', roles:['admin'],        cor:'#e8d5a3'},
    {id:'comercial',label:'Comercial',     roles:['sdr','closer','parceiro'],cor:'#4680ff'},
    {id:'operacional',label:'Operacional', roles:['advogado','estagiario','financeiro','recepcionista'],cor:'#1de9b6'},
  ];

  CATS.forEach(cat=>{
    const membros=USERS.filter(u=>cat.roles.includes(u.role));
    if(!membros.length)return;

    // Header da categoria
    const catHdr=div({display:'flex',alignItems:'center',gap:'10px',
      margin:'0 0 10px',padding:'8px 14px',
      background:`${cat.cor}0F`,borderRadius:'8px',
      border:`1px solid ${cat.cor}22`});
    catHdr.appendChild(div({width:'4px',height:'20px',borderRadius:'2px',background:cat.cor,flexShrink:0}));
    catHdr.appendChild(el('span',{style:{fontFamily:CI,fontSize:'11px',fontWeight:700,
      color:cat.cor,textTransform:'uppercase',letterSpacing:'1px'}},cat.label));
    catHdr.appendChild(el('span',{style:{fontSize:'10px',color:B.dim,marginLeft:'4px'}},
      `(${membros.length} usuário${membros.length!==1?'s':''})`));
    cont.appendChild(catHdr);

    const tb=card([],{padding:0,overflow:'hidden',marginBottom:'18px'});
    const t=el('table',{style:{width:'100%',borderCollapse:'collapse'}});
    const thead=el('thead'),hr=el('tr',{style:{borderBottom:'1px solid '+B.border}});
    ['','Usuário','Perfil','E-mail','Foto'].forEach(c=>
      hr.appendChild(el('th',{style:{padding:'7px 12px',textAlign:'left',fontSize:'10px',
        fontWeight:700,color:B.muted,textTransform:'uppercase',letterSpacing:'.5px'}},c)));
    thead.appendChild(hr);t.appendChild(thead);
    const tbody=el('tbody');

    membros.forEach((u,i)=>{
      const tr=el('tr',{style:{borderBottom:'1px solid '+B.border}});
      tr.onmouseover=()=>tr.style.background='rgba(255,255,255,0.03)';
      tr.onmouseout=()=>tr.style.background='transparent';

      // Número
      tr.appendChild(el('td',{style:{padding:'9px 12px',fontSize:'11px',color:B.dim,
        fontFamily:CI,width:'28px'}},String(i+1)));

      // Avatar + Nome
      const photoKey='userPhoto_'+u.id;
      tr.appendChild(el('td',{style:{padding:'9px 12px'}},
        div({display:'flex',alignItems:'center',gap:'10px'},
          avUser(u.id,u.nome,34),
          div({},
            div({fontSize:'13px',fontWeight:600,color:B.text},u.nome),
            u.id===user.id
              ?el('span',{style:{fontSize:'9px',fontWeight:700,padding:'1px 7px',
                  borderRadius:'20px',background:'rgba(29,233,182,0.15)',color:'#1de9b6'}},'Você')
              :el('span',{style:{fontSize:'10px',color:B.muted}},u.email)
          )
        )
      ));

      // Perfil badge
      tr.appendChild(el('td',{style:{padding:'9px 12px'}},
        el('span',{style:{fontSize:'10px',fontWeight:700,padding:'3px 10px',borderRadius:'20px',
          background:RCLR[u.role]+'22',color:RCLR[u.role],whiteSpace:'nowrap'}},
          RLBL[u.role]||u.role)
      ));

      // E-mail
      tr.appendChild(el('td',{style:{padding:'9px 12px',fontSize:'11px',color:B.muted}},u.email));

      // Upload foto
      const photoCell=el('td',{style:{padding:'9px 12px'}});
      const hasPhoto=!!localStorage.getItem(photoKey);
      const row_btns=div({display:'flex',alignItems:'center',gap:'6px'});

      const lbl=document.createElement('label');
      lbl.style.cssText='cursor:pointer;display:inline-flex;align-items:center;gap:5px;'+
        'background:rgba(70,128,255,0.1);border:1px solid rgba(70,128,255,0.3);'+
        'border-radius:7px;padding:4px 11px;font-size:11px;color:#4680ff;transition:all .15s';
      lbl.innerHTML=hasPhoto?'&#128247; Trocar':'&#128247; Foto';
      lbl.onmouseover=()=>lbl.style.background='rgba(70,128,255,0.2)';
      lbl.onmouseout=()=>lbl.style.background='rgba(70,128,255,0.1)';
      const inp=document.createElement('input');
      inp.setAttribute('type','file');inp.setAttribute('accept','image/*');
      inp.style.display='none';
      inp.onchange=ev=>{
        const file=ev.target.files[0];if(!file)return;
        if(file.size>2*1024*1024){alert('Imagem muito grande. Máximo 2 MB.');return;}
        const reader=new FileReader();
        reader.onload=e2=>{localStorage.setItem(photoKey,e2.target.result);render();};
        reader.readAsDataURL(file);
      };
      lbl.appendChild(inp);row_btns.appendChild(lbl);
      if(hasPhoto){
        const rmv=el('button',{style:{background:'none',border:'none',cursor:'pointer',
          color:B.bad,fontSize:'12px',padding:'2px 5px'}},'✕');
        rmv.title='Remover foto';
        rmv.onclick=()=>{localStorage.removeItem(photoKey);render();};
        row_btns.appendChild(rmv);
      }
      photoCell.appendChild(row_btns);
      tr.appendChild(photoCell);
      tbody.appendChild(tr);
    });
    t.appendChild(tbody);tb.appendChild(t);cont.appendChild(tb);
  });

  cont.appendChild(div({padding:'12px 16px',
    background:'rgba(29,233,182,0.04)',borderRadius:'8px',
    border:'1px solid rgba(29,233,182,0.12)',fontSize:'12px',color:B.muted},
    '💡 Fotos salvas localmente (máx 2 MB). Apenas o Administrador tem visão de todos os usuários e suas atividades.'));
  return cont;
}

function Login(){
  const wrap=div({minHeight:'100vh',width:'100%',background:B.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'});
  const inner=div({width:'100%',maxWidth:'420px',animation:'fadeIn .4s ease'});
  const box=div({background:'rgba(30,36,52,0.98)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'16px',overflow:'hidden',boxShadow:'0 30px 80px rgba(0,0,0,.7)'});
  box.appendChild(div({height:'3px',background:'linear-gradient(90deg,transparent,#4680ff,#1de9b6,#a389d4,#1de9b6,#4680ff,transparent)'}));
  const body=div({padding:'30px 34px 26px'});
  body.appendChild((function(){
      const ld=document.createElement('div');
      ld.style.cssText='text-align:center;margin-bottom:20px;padding-top:6px';
      const li=document.createElement('img');li.src=LOGO_C;
      li.style.cssText='max-width:225px;width:100%;filter:drop-shadow(0 0 14px rgba(180,150,46,.35)) brightness(1.05)';
      ld.appendChild(li);
      const sub=document.createElement('div');
      sub.style.cssText='font-size:11px;color:#7b96c4;margin-top:8px;font-family:Inter,sans-serif';
      sub.textContent='Sistema de Gestão Jurídica · Demo';
      ld.appendChild(sub);
      return ld;
    })())
  body.appendChild(div({height:'.5px',background:'linear-gradient(90deg,transparent,'+B.border+',transparent)',marginBottom:'20px'}));

  const emailWrap=div({marginBottom:'18px'});emailWrap.appendChild(lbl('E-mail de acesso'));
  const emailEl=el('input',{type:'email',placeholder:'E-mail de acesso',style:{width:'100%',padding:'9px 12px',borderRadius:'8px',border:'1px solid '+B.blt,background:B.bg,color:B.text,fontSize:'14px',fontFamily:PH,outline:'none',boxSizing:'border-box'}});
  emailWrap.appendChild(emailEl);body.appendChild(emailWrap);

  const senhaWrap=div({marginBottom:'20px'});senhaWrap.appendChild(lbl('Senha — 6 dígitos'));
  const digitsRow=div({display:'flex',gap:'8px',justifyContent:'center'});
  const dEls=Array.from({length:6},()=>{const d=el('input',{type:'password',maxlength:'1',style:{width:'40px',height:'46px',textAlign:'center',fontSize:'20px',fontWeight:700,fontFamily:CI,borderRadius:'7px',border:'1.5px solid '+B.blt,background:B.bg,color:B.gold,outline:'none'}});d.setAttribute('inputmode','numeric');return d;});
  dEls.forEach((d,i)=>{
    d.addEventListener('keydown',e=>{
      if(e.key==='Backspace'){e.preventDefault();d.value='';d.style.borderColor=B.blt;d.style.background=B.bg;if(i>0)dEls[i-1].focus();}
      else if(/^\d$/.test(e.key)){e.preventDefault();d.value=e.key;d.style.borderColor=B.bronze;d.style.background=B.hi;if(i<5)dEls[i+1].focus();else setTimeout(tryLogin,100);}
    });
    d.addEventListener('paste',e=>{e.preventDefault();const p=e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);p.split('').forEach((c,j)=>{if(dEls[j]){dEls[j].value=c;dEls[j].style.borderColor=B.bronze;dEls[j].style.background=B.hi;}});});
    digitsRow.appendChild(d);
  });
  senhaWrap.appendChild(digitsRow);body.appendChild(senhaWrap);

  const errDiv=div({background:B.bad+'18',border:'1px solid '+B.bad+'44',borderRadius:'8px',padding:'8px 12px',marginBottom:'12px',fontSize:'12px',color:B.bad,textAlign:'center',display:'none'},'');
  body.appendChild(errDiv);

  function tryLogin(){
    const pwd=dEls.map(d=>d.value).join('');
    if(pwd.length!==6)return;
    const found=USERS.find(u=>u.email.toLowerCase()===emailEl.value.trim().toLowerCase()&&u.senha===pwd);
    if(!found){
      const notUser=!USERS.find(u=>u.email.toLowerCase()===emailEl.value.trim().toLowerCase());
      errDiv.textContent=notUser?'E-mail não encontrado.':'Senha incorreta.';
      errDiv.style.display='block';
      dEls.forEach(d=>{d.value='';d.style.borderColor=B.blt;d.style.background=B.bg;});
      dEls[0].focus();
      box.style.animation='shake .45s ease';
      setTimeout(()=>box.style.animation='',500);
      return;
    }
    user=found;view='dashboard';render();
  }
  const loginBtn=el('button',{style:{width:'100%',padding:'12px',borderRadius:'9px',border:'none',background:B.bronze,color:B.bg,fontFamily:CI,fontSize:'12px',fontWeight:700,letterSpacing:'.8px',cursor:'pointer'}},'Entrar no Sistema');
  loginBtn.onclick=tryLogin;body.appendChild(loginBtn);
  body.appendChild(div({height:'.5px',background:'linear-gradient(90deg,transparent,'+B.border+',transparent)',margin:'20px 0 14px'}));

  const perfisGrid=div({display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px'});
    box.appendChild(body);
  box.appendChild(div({background:B.bg,padding:'8px 34px',borderTop:'1px solid '+B.border,textAlign:'center'},span('OAB/SP 255.932 · Ribeirão Preto',{fontSize:'10px',color:B.dim})));
  inner.appendChild(box);wrap.appendChild(inner);return wrap;
}

/* ── RENDER ── */
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  if(!user){app.appendChild(Login());return;}
  if(user.primeiroAcesso){app.appendChild(TrocarSenha());return;}
  const p=isParceiro(user),interno=isInterno(user),admin=isAdmin(user);
  const layout=div({display:'flex',width:'100%',minHeight:'100vh'});
  layout.appendChild(Sidebar());
  const main=div({flex:1,overflowY:'auto',padding:'22px 24px',minWidth:0});

  // ── Relógio no topo direito ──
  (function(){
    // Cria elementos com atributos HTML corretos (não via div() que só aplica estilos)
    const rWidget = document.createElement('div');
    rWidget.style.cssText='display:flex;justify-content:flex-end;align-items:flex-start;'+
      'padding:0 0 10px;margin-bottom:2px;pointer-events:none';

    const rBox = document.createElement('div');
    rBox.style.cssText='text-align:right;background:rgba(7,19,48,0.65);'+
      'backdrop-filter:blur(10px);border:1px solid rgba(29,233,182,0.2);'+
      'border-radius:10px;padding:6px 12px 6px 8px;min-width:0;'+
      'box-shadow:0 0 20px rgba(29,233,182,0.06);display:inline-block';

    const rData = document.createElement('div');
    rData.style.cssText="font-family:'Cinzel',serif;font-size:12px;font-weight:700;"+
      "color:#d4af5a;letter-spacing:.5px;line-height:1.3";

    const rHora = document.createElement('div');
    rHora.style.cssText="font-family:'Cinzel',serif;font-size:12px;font-weight:700;"+
      "color:#1de9b6;letter-spacing:.5px;line-height:1.3;margin-top:1px";

    function atualizaRelogio(){
      const n=new Date();
      const dd=String(n.getDate()).padStart(2,'0');
      const mm=String(n.getMonth()+1).padStart(2,'0');
      const aaaa=n.getFullYear();
      const hh=String(n.getHours()).padStart(2,'0');
      const min=String(n.getMinutes()).padStart(2,'0');
      const ss=String(n.getSeconds()).padStart(2,'0');
      rData.textContent=dd+'/'+mm+'/'+aaaa;
      rHora.textContent=hh+':'+min+':'+ss;
    }

    rBox.appendChild(rData);
    rBox.appendChild(rHora);
    rWidget.appendChild(rBox);
    main.appendChild(rWidget);

    atualizaRelogio();
    if(window._relogioTimer) clearInterval(window._relogioTimer);
    window._relogioTimer = setInterval(atualizaRelogio, 1000);
  })();

  if     (view==='dashboard')main.appendChild(Dashboard());
  else if(view==='leads')    main.appendChild(LeadsList());
  else if(view==='novo')     main.appendChild(NovoLead());
  else if(view==='detail')   main.appendChild(LeadDetail());
  else if(view==='calc'   &&interno)main.appendChild(Calculadora());
  else if(view==='indicacoes'&&interno)main.appendChild(Indicacoes());
  else if(view==='status_ind'&&p)main.appendChild(StatusIndicacao());
  else if(view==='financeiro'&&(p||admin))main.appendChild(FinanceiroParceiro(admin?null:user.id));
  else if(view==='analytics' &&admin)main.appendChild(Analytics());
  else if(view==='usuarios'   &&admin)main.appendChild(Usuarios());
  else if(view==='ger_usuarios'&&admin)main.appendChild(GerenciarUsuarios());
  else if(view==='novo_usuario'&&admin)main.appendChild(NovoUsuarioAdmin());
  else if(view==='ia'    &&(admin||isSdr(user)||isCloser(user)))main.appendChild(RelatorioAtendimento());
  else if(view==='op_agenda'&&(admin||isOperacional(user)))main.appendChild(AgendaModulo('Operacional'));
  else if(view==='acoes_novas'&&(admin||isAdvogado(user)||isEstagiario(user)))main.appendChild(AcoesNovas());
  else if(view==='docs' &&(admin||isCloser(user)||isSdr(user)))main.appendChild(GerarDocumentos());
  else if(view==='agenda'&&(admin||isComercial(user)))main.appendChild(AgendaModulo('Comercial'));
  else main.appendChild(Dashboard());

  layout.appendChild(main);app.appendChild(layout);
}

render();



</script>

// ── PARTÍCULAS ──
(function(){
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H, nodes = [];
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const palette = ['rgba(29,233,182,','rgba(70,128,255,','rgba(163,137,212,','rgba(247,195,33,'];
  for(let i = 0; i < 50; i++){
    nodes.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
      r:Math.random()*2+.8, alpha:Math.random()*.6+.1,
      col:palette[Math.floor(Math.random()*palette.length)],
      phase:Math.random()*Math.PI*2
    });
  }
  let t=0;
  function draw(){
    t+=.007; ctx.clearRect(0,0,W,H);
    nodes.forEach(n=>{
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<0)n.x=W; if(n.x>W)n.x=0;
      if(n.y<0)n.y=H; if(n.y>H)n.y=0;
      const a = n.alpha*(0.6+0.4*Math.sin(t+n.phase));
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle = n.col+a+')'; ctx.fill();
    });
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];
        const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<140){
          ctx.beginPath(); ctx.moveTo(a.x,a
